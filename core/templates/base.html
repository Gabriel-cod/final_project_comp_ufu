<!DOCTYPE html>
<html lang="t-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Controle de Missões</title>
</head>

<body>
    <nav class="bg-gray-800 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{% url 'list_missions' %}" class="text-white text-lg font-bold">Controle de Missões</a>
            <div class="hidden md:flex space-x-4">
                <a href="{% url 'list_missions' %}" class="text-gray-300 hover:text-white">Missões</a>
                <a href="{% url 'list_professionals' %}" class="text-gray-300 hover:text-white">Profissionais</a>
                <a href="{% url 'list_fleets' %}" class="text-gray-300 hover:text-white">Frotas</a>
            </div>
            <div class="md:hidden">
                <button class="text-gray-300 hover:text-white focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>
    {% block content %}
    {% endblock %}
</body>

</html>
