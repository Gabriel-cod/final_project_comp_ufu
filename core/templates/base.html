<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importando a fonte monoespaçada para dar a cara de terminal -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <title>Controle de Missões // SYS.ON</title>

    <style>
        /* Configurações base do Body para o HUD */
        body {
            background-color: #05080a;
            font-family: 'Share Tech Mono', monospace;
            color: #e2e8f0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            
            /* O Grid tático de fundo feito com CSS */
            background-image:
                linear-gradient(rgba(45, 85, 90, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(45, 85, 90, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center center;
            min-height: 100vh;
            margin: 0;
            position: relative;
        }

        /* Efeito de "Scanline" (linhas de monitor antigo) por cima da tela */
        body::before {
            content: " ";
            display: block;
            position: fixed; /* Fixed para acompanhar o scroll */
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 50;
            background-size: 100% 3px;
            pointer-events: none; /* Garante que você consiga clicar nos botões por baixo */
        }

        /* Animação suave para links normais */
        .neon-text-hover:hover {
            color: #6ac2b9;
            text-shadow: 0 0 8px rgba(106, 194, 185, 0.6);
        }

        /* --- ESTILOS DE BOTÕES TÁTICOS --- */

        /* 1. Botão Primário (Foco / Ação Principal) */
        .btn-primary {
            background-color: #6ac2b9;
            color: #05080a;
            border: 1px solid #6ac2b9;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #8ce8df;
            box-shadow: 0 0 15px rgba(106, 194, 185, 0.6);
        }

        /* 2. Botão Tático (Ação Secundária com marcadores nos cantos) */
        .btn-tactical {
            position: relative;
            background: rgba(5, 8, 10, 0.6);
            border: 1px solid rgba(106, 194, 185, 0.4);
            color: #6ac2b9;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .btn-tactical:hover {
            background: rgba(106, 194, 185, 0.15);
            border-color: #6ac2b9;
            box-shadow: 0 0 12px rgba(106, 194, 185, 0.3), inset 0 0 8px rgba(106, 194, 185, 0.2);
        }
        /* Pseudo-elementos para criar os [ ] nos cantos do botão */
        .btn-tactical::before, .btn-tactical::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            border-color: #6ac2b9;
            border-style: solid;
            transition: all 0.3s ease;
        }
        .btn-tactical::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
        .btn-tactical::after { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
        
        .btn-tactical:hover::before, .btn-tactical:hover::after {
            width: 10px;
            height: 10px;
        }

        /* 3. Botão de Alerta/Danger (Cancelamentos) */
        .btn-danger {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.5);
            color: #ef4444;
            transition: all 0.3s ease;
        }
        .btn-danger:hover {
            background: rgba(220, 38, 38, 0.2);
            border-color: #ef4444;
            color: #fca5a5;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.4);
        }

        /* Estilo para painéis/cards */
        .sci-fi-panel {
            background: rgba(5, 8, 10, 0.85);
            border: 1px solid rgba(106, 194, 185, 0.3);
            backdrop-filter: blur(5px);
            position: relative;
        }
        /* Decorador de canto para os painéis */
        .sci-fi-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 20px; height: 20px;
            border-top: 2px solid #6ac2b9;
            border-left: 2px solid #6ac2b9;
        }
        form div > label {
            display: block;
            font-size: 0.875rem;
            color: #42827a;
            margin-bottom: 0.25rem;
        }
        
        /* Remove as "bolinhas" e estiliza a lista de checkboxes */
        form ul {
            list-style-type: none;
            padding-left: 0;
            margin-top: 0.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.5rem;
        }
        
        form div {
            margin-bottom: 1.5rem;
        }

        form table th label {
            color: white;
        }

        form label[for^="id_operator"] {
            color: white;
        }
        
    </style>
</head>

<body class="antialiased">
    <!-- Nav transformada em uma barra de status do sistema -->
    <nav class="border-b border-[#6ac2b9]/30 bg-[#05080a]/90 backdrop-blur-md p-4 sticky top-0 z-40 shadow-[0_4px_15px_rgba(0,0,0,0.5)]">
        <div class="container mx-auto flex justify-between items-center">
            
            <!-- Logo com marcadores de bracket [ ] -->
            <a href="#" class="text-[#6ac2b9] text-xl font-bold tracking-widest neon-text-hover flex items-center gap-2">
                <span class="text-[#42827a]">[</span>
                Controle_Missões
                <span class="text-[#42827a]">]</span>
            </a>

            <!-- Links do Menu com teclas de atalho falsas (F1, F2...) -->
            <div class="hidden md:flex space-x-8 text-sm">
                <a href="{% url 'list_missions' %}" class="text-gray-400 neon-text-hover transition-all duration-200">
                    <span class="text-[#42827a] mr-1">F1:</span>Missões
                </a>
                <a href="{% url 'list_professionals' %}" class="text-gray-400 neon-text-hover transition-all duration-200">
                    <span class="text-[#42827a] mr-1">F2:</span>Profissionais
                </a>
                <a href="{% url 'list_fleets' %}" class="text-gray-400 neon-text-hover transition-all duration-200">
                    <span class="text-[#42827a] mr-1">F3:</span>Frotas
                </a>
            </div>

            <!-- Botão Mobile com traços mais retos (square) -->
            <div class="md:hidden">
                <button class="text-[#6ac2b9] hover:text-white focus:outline-none transition-colors">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- MAIN com Z-index para ficar acima do grid e abaixo do scanline -->
    <main class="container mx-auto mt-8 p-4 relative z-40">
        
    {% block content %}
    {% endblock %}

    </main>
</body>
</html>
